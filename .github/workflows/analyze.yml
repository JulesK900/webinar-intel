name: analyze

on:
  push:
    branches: [main]
    paths:
      - "transcripts/**"
  workflow_dispatch:
    inputs:
      transcript:
        description: "Transcript file to re-analyze (blank = all)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Analyze new transcripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          BRIEF_DOC_ID: ${{ secrets.BRIEF_DOC_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.transcript }}" ]; then
              changed="${{ inputs.transcript }}"
            else
              changed=$(ls transcripts/*.json 2>/dev/null || true)
            fi
          else
            changed=$(git diff --name-only HEAD^ HEAD -- transcripts/ \
              | grep '\.json$' || true)
          fi
          if [ -z "$changed" ]; then
            echo "No transcripts to analyze."
            exit 0
          fi
          for f in $changed; do
            echo "Analyzing $f"
            webinar-intel analyze "$f"
          done
      - name: Commit briefs, log, and vault learnings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefs/ BRIEFS.md context-vault/
          if git diff --cached --quiet; then
            echo "No new brief to commit."
          else
            git commit -m "brief: analyze new transcripts"
            git push
          fi
