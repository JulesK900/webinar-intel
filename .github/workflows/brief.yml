name: brief

on:
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube URL of the competitor webinar"
        required: true
        type: string
      competitor:
        description: "Competitor profile slug (matches profiles/<slug>.md)"
        required: true
        default: "zenity"
        type: string

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          BRIEF_DOC_ID: ${{ secrets.BRIEF_DOC_ID }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
          URL: ${{ inputs.url }}
          COMPETITOR: ${{ inputs.competitor }}
        run: |
          webinar-intel brief "$URL" --competitor "$COMPETITOR"
      - name: Commit brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefs/
          if git diff --cached --quiet; then
            echo "No new brief to commit."
          else
            git commit -m "brief: ${{ inputs.competitor }} — ${{ inputs.url }}"
            git push
          fi
